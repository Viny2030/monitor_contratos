name: Tests Automáticos

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install pytest pandas openpyxl fastapi httpx asyncpg pydantic requests beautifulsoup4

      - name: Correr tests
        run: |
          pytest test_auditoria.py -v
        continue-on-error: true